name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      # 의존성 없음(node:test). 테스트가 build.mjs를 먼저 실행해 dist를 빌드한다.
      - run: node --test
