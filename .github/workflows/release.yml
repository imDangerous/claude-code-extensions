name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Build
        run: node build.mjs
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/bundle.mjs
            dist/install.mjs
          generate_release_notes: true
